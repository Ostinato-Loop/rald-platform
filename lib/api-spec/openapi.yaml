openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: |
    RALD Platform Identity Service API.
    Provides universal identity for all RALD products (PayRald, Messenger, Elimu, ALIA, Mail, Dispatch, Control Center).
    Every user receives a RALD UUID, ALIA handle, wallet ID, and RALD email address on signup.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: identity
    description: Universal RALD Identity — authentication and profile management
  - name: alia
    description: ALIA Universal Routing — resolve and manage RALD alias handles
  - name: events
    description: RALD Event Bus — observe and manage the internal event stream
  - name: wallet
    description: PayRald Wallet — balance, transactions, and transfers via ALIA handles

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /identity/signup:
    post:
      operationId: identitySignup
      tags: [identity]
      summary: Create a new RALD identity
      description: |
        Creates a unified RALD identity. On success, automatically provisions:
        - RALD UUID (`rld_xxxxxxxxxx`)
        - ALIA alias handle (`username@rald`)
        - RALD email address (`username@rald.cloud`)
        - Wallet ID (`wallet_rld_xxxxxxxxxx`)
        Publishes `identity.created`, `alias.provision_requested`, `wallet.provision_requested`,
        and `mail.provision_requested` events to the RALD Event Bus.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
            examples:
              basic:
                summary: Standard signup
                value:
                  username: boyd
                  email: boyd@example.com
                  password: MySecurePass123
      responses:
        "201":
          description: Identity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "409":
          description: Username or email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /identity/login:
    post:
      operationId: identityLogin
      tags: [identity]
      summary: Authenticate a RALD identity
      description: |
        Authenticates with email and password. Returns a signed JWT (HS256, 1-hour TTL)
        and the full user profile. The JWT `sub` field is the RALD UUID.
        Token should be stored in memory (not localStorage) by the consuming product.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              basic:
                summary: Email + password login
                value:
                  email: boyd@example.com
                  password: MySecurePass123
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /identity/profile:
    get:
      operationId: identityGetProfile
      tags: [identity]
      summary: Get the authenticated user's RALD identity
      description: Returns the full RALD identity record for the JWT holder.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RALDIdentity"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: identityUpdateProfile
      tags: [identity]
      summary: Update the authenticated user's profile
      description: |
        Updates mutable profile fields. Changing `username` also updates
        `aliasHandle` (`username@rald`) and `raldEmail` (`username@rald.cloud`).
        Publishes `identity.updated` event.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RALDIdentity"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet:
    get:
      operationId: walletGet
      tags: [wallet]
      summary: Get the authenticated user's PayRald wallet
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Wallet record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RALDWallet"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Wallet not found (not yet provisioned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/transactions:
    get:
      operationId: walletListTransactions
      tags: [wallet]
      summary: List transactions for the authenticated user's wallet
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /wallet/credit:
    post:
      operationId: walletCredit
      tags: [wallet]
      summary: Credit the authenticated user's wallet
      description: Adds funds to the wallet. Amount is in minor units (e.g. NGN kobo).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditRequest"
            examples:
              example:
                value:
                  amount: 10000
                  currency: NGN
                  description: Top-up from Bank Transfer
      responses:
        "201":
          description: Wallet credited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletMutationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Wallet is frozen or closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/debit:
    post:
      operationId: walletDebit
      tags: [wallet]
      summary: Debit the authenticated user's wallet
      description: Deducts funds from the wallet. Returns 422 if balance is insufficient.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DebitRequest"
      responses:
        "201":
          description: Wallet debited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletMutationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Insufficient funds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientFundsError"

  /wallet/admin:
    get:
      operationId: adminWalletList
      tags: [wallet]
      summary: Admin — list all wallets with filters and pagination
      description: |
        Returns a paginated list of wallets across all users.
        Supports filtering by status, balance range, and sorting by any wallet field.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, frozen, closed]
          description: Filter by wallet status
        - name: minBalance
          in: query
          schema:
            type: integer
            minimum: 0
          description: Minimum balance (inclusive, minor units)
        - name: maxBalance
          in: query
          schema:
            type: integer
            minimum: 0
          description: Maximum balance (inclusive, minor units)
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, balance, updatedAt]
            default: createdAt
        - name: sortDir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated wallet list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWalletListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin privileges required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/admin/{walletId}:
    get:
      operationId: adminWalletGet
      tags: [wallet]
      summary: Admin — inspect any wallet by ID
      description: Returns the wallet record plus its 20 most recent transactions. Requires admin role.
      security:
        - bearerAuth: []
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
          description: The wallet ID to inspect (format `wallet_rld_xxxxxxxxxx`)
          example: wallet_rld_8dj39sj29k
      responses:
        "200":
          description: Wallet with recent transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWalletResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin privileges required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/admin/{walletId}/freeze:
    post:
      operationId: adminWalletFreeze
      tags: [wallet]
      summary: Admin — freeze a wallet
      description: |
        Freezes a wallet, preventing all debits, credits, and transfers.
        Idempotent — returns 200 if already frozen.
        Cannot freeze a closed wallet.
      security:
        - bearerAuth: []
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
          example: wallet_rld_8dj39sj29k
      responses:
        "200":
          description: Wallet frozen (or was already frozen)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWalletActionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin privileges required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Cannot freeze a closed wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/admin/{walletId}/unfreeze:
    post:
      operationId: adminWalletUnfreeze
      tags: [wallet]
      summary: Admin — unfreeze a wallet
      description: |
        Restores a frozen wallet to active status.
        Idempotent — returns 200 if already active.
        Cannot unfreeze a closed wallet.
      security:
        - bearerAuth: []
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
          example: wallet_rld_8dj39sj29k
      responses:
        "200":
          description: Wallet unfrozen (or was already active)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWalletActionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin privileges required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Cannot unfreeze a closed wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/transfer:
    post:
      operationId: walletTransfer
      tags: [wallet]
      summary: Transfer funds to another RALD user via ALIA handle
      description: |
        Transfers from the authenticated user's wallet to the recipient's wallet.
        The `to` field accepts an ALIA handle (`boyd@rald`) or bare username (`boyd`).
        Both wallets must be active. Creates paired transfer_out / transfer_in transactions.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferRequest"
            examples:
              alia_handle:
                summary: Transfer via ALIA handle
                value:
                  to: boyd@rald
                  amount: 5000
                  description: Lunch split
      responses:
        "201":
          description: Transfer completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Sender or recipient wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Insufficient funds or invalid transfer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientFundsError"

  /events:
    get:
      operationId: eventsList
      tags: [events]
      summary: List RALD events
      description: Returns paginated events. Filterable by type and processed status. Requires auth.
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [identity.created, identity.updated, identity.suspended, identity.reactivated, wallet.provision_requested, mail.provision_requested, alias.provision_requested]
          description: Filter by event type
        - name: processed
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: Filter by processed status
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Event list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/stats:
    get:
      operationId: eventsStats
      tags: [events]
      summary: Event bus statistics
      description: Returns per-type counts of processed vs pending events.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventStatsResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/{id}/retry:
    post:
      operationId: eventsRetry
      tags: [events]
      summary: Re-queue a failed event for retry
      description: Resets processed=false and retries=0 so the event bus worker will re-process the event.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Event queued for retry
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                required: [ok, message]
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /alia/resolve/{alias}:
    get:
      operationId: aliaResolve
      tags: [alia]
      summary: Resolve a RALD alias handle
      description: |
        Public endpoint — no authentication required.
        Resolves any active ALIA alias (e.g. `boyd@rald`) to its full identity resolution:
        wallet ID, username, RALD email, trust score, and KYC tier.
      parameters:
        - name: alias
          in: path
          required: true
          schema:
            type: string
          description: The ALIA handle to resolve, e.g. `boyd@rald`
          example: boyd@rald
      responses:
        "200":
          description: Alias resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AliasResolveResponse"
        "404":
          description: Alias not found or inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /alia/aliases:
    get:
      operationId: aliaListAliases
      tags: [alia]
      summary: List all aliases for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Alias list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AliasListResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: aliaCreateAlias
      tags: [alia]
      summary: Create an additional alias for the authenticated user
      description: |
        Creates a new RALD alias pointing to the authenticated user's identity.
        The alias must be in the format `handle@rald`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAliasRequest"
            examples:
              business:
                summary: Business alias
                value:
                  alias: boydtech@rald
                  aliasType: business
      responses:
        "201":
          description: Alias created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RALDAlias"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Alias already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /alia/aliases/{id}/status:
    patch:
      operationId: aliaUpdateAliasStatus
      tags: [alia]
      summary: Update the status of an alias
      description: Set an alias to active, suspended, or archived.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAliasStatusRequest"
      responses:
        "200":
          description: Alias updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RALDAlias"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Alias not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /identity/activate-product:
    post:
      operationId: identityActivateProduct
      tags: [identity]
      summary: Activate a RALD product for the authenticated user
      description: |
        Marks a RALD product as activated for this identity. Idempotent — calling
        with an already-activated product is a no-op. Supported products:
        `payrald`, `messenger`, `elimu`, `dispatch`, `mail`, `alia`, `crm`, `control-center`.
        Publishes `identity.updated` event with `activatedProduct` in payload.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateProductRequest"
            examples:
              payrald:
                summary: Activate PayRald
                value:
                  product: payrald
              messenger:
                summary: Activate Messenger
                value:
                  product: messenger
      responses:
        "200":
          description: Updated product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateProductResponse"
        "400":
          description: Validation error or unknown product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /identity/admin:
    get:
      operationId: adminUserList
      tags: [identity]
      summary: Admin — list all users with filters and pagination
      description: |
        Returns a paginated list of all RALD identities.
        Password hashes are never included in the response.
        Supports filtering by role, suspension status, KYC tier, and registration date range.
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [user, admin]
          description: Filter by user role
        - name: suspended
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: Filter by suspension status — "true" for suspended users only, "false" for active only
        - name: kycTier
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 3
          description: Filter by KYC tier (1=basic, 2=verified, 3=enhanced)
        - name: createdAfter
          in: query
          schema:
            type: string
            format: date-time
          description: Return users created at or after this ISO 8601 timestamp
          example: "2026-01-01T00:00:00Z"
        - name: createdBefore
          in: query
          schema:
            type: string
            format: date-time
          description: Return users created at or before this ISO 8601 timestamp
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, username, trustScore, kycTier]
            default: createdAt
        - name: sortDir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin privileges required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        RALD JWT — HS256 signed, 1-hour TTL.
        Payload: `{ sub: "rld_xxxxxxxxxx", username: "boyd", email: "boyd@example.com", iat, exp }`

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RALDIdentity:
      type: object
      description: A universal RALD identity record shared across all RALD products.
      properties:
        id:
          type: string
          description: RALD UUID — format `rld_xxxxxxxxxx`
          example: rld_8dj39sj29k
        username:
          type: string
          description: Unique lowercase username (3–30 chars, alphanumeric + underscore)
          example: boyd
        email:
          type: string
          format: email
          description: Registration email address
          example: boyd@example.com
        raldEmail:
          type: string
          nullable: true
          description: Auto-provisioned RALD email address
          example: boyd@rald.cloud
        aliasHandle:
          type: string
          nullable: true
          description: ALIA alias handle — used for payments, messaging, and routing
          example: boyd@rald
        walletId:
          type: string
          nullable: true
          description: PayRald wallet ID — format `wallet_rld_xxxxxxxxxx`
          example: wallet_rld_8dj39sj29k
        trustScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Platform trust score (0 = new, 100 = fully verified)
          example: 0
        kycTier:
          type: integer
          minimum: 1
          maximum: 3
          description: KYC verification tier (1 = basic, 2 = verified, 3 = enhanced)
          example: 1
        activatedProducts:
          type: array
          items:
            type: string
          description: List of RALD products this identity has activated
          example: [payrald, messenger]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - email
        - trustScore
        - kycTier
        - activatedProducts
        - createdAt
        - updatedAt

    AuthResponse:
      type: object
      description: Successful authentication response
      properties:
        token:
          type: string
          description: Signed JWT (HS256, 1-hour TTL). Store in memory — NOT in localStorage.
        expiresIn:
          type: integer
          description: Token TTL in seconds
          example: 3600
        user:
          $ref: "#/components/schemas/RALDIdentity"
      required:
        - token
        - expiresIn
        - user

    SignupRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: "^[a-z0-9_]+$"
          description: Lowercase alphanumeric + underscore only
          example: boyd
        email:
          type: string
          format: email
          example: boyd@example.com
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: Minimum 8 characters
        displayName:
          type: string
          minLength: 1
          maxLength: 100
          description: Optional display name
      required:
        - username
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: boyd@example.com
        password:
          type: string
          minLength: 1
      required:
        - email
        - password

    UpdateProfileRequest:
      type: object
      description: At least one field must be provided
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: "^[a-z0-9_]+$"
          description: Changing username also updates aliasHandle and raldEmail
        displayName:
          type: string
          minLength: 1
          maxLength: 100

    ActivateProductRequest:
      type: object
      properties:
        product:
          type: string
          enum:
            - payrald
            - messenger
            - elimu
            - dispatch
            - mail
            - alia
            - crm
            - control-center
          description: RALD product to activate
          example: payrald
      required:
        - product

    ActivateProductResponse:
      type: object
      properties:
        activatedProducts:
          type: array
          items:
            type: string
          description: Updated list of all activated products
          example: [payrald, messenger]
      required:
        - activatedProducts

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
        reason:
          type: string
          description: Machine-readable reason code (optional)
      required:
        - error

    ValidationError:
      type: object
      properties:
        error:
          type: string
          example: Validation failed
        issues:
          type: array
          items:
            type: object
            properties:
              path:
                type: array
                items:
                  type: string
              message:
                type: string
      required:
        - error
        - issues

    RALDEvent:
      type: object
      description: A RALD Event Bus record
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [identity.created, identity.updated, identity.suspended, identity.reactivated, wallet.provision_requested, mail.provision_requested, alias.provision_requested]
        producer:
          type: string
          example: rald-identity
        payload:
          type: object
          additionalProperties: true
        processed:
          type: boolean
        processedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
          description: Error message if processing failed
        retries:
          type: string
          description: Number of processing attempts as a string
          example: "0"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - producer
        - payload
        - processed
        - retries
        - createdAt

    EventListResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/RALDEvent"
        total:
          type: integer
          description: Total matching events (for pagination)
        limit:
          type: integer
        offset:
          type: integer
      required:
        - events
        - total
        - limit
        - offset

    EventStatsResponse:
      type: object
      properties:
        byType:
          type: object
          additionalProperties:
            type: object
            properties:
              total:
                type: integer
              processed:
                type: integer
              pending:
                type: integer
            required: [total, processed, pending]
        totalPending:
          type: integer
        totalProcessed:
          type: integer
      required:
        - byType
        - totalPending
        - totalProcessed

    AliasResolution:
      type: object
      description: The resolved identity data behind an ALIA alias handle
      properties:
        walletId:
          type: string
          nullable: true
          description: PayRald wallet ID
          example: wallet_rld_8dj39sj29k
        username:
          type: string
          description: RALD username
          example: boyd
        raldEmail:
          type: string
          nullable: true
          description: RALD email address
          example: boyd@rald.cloud
        trustScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Platform trust score
          example: 0
        kycTier:
          type: integer
          minimum: 1
          maximum: 3
          description: KYC verification tier
          example: 1
      required:
        - username
        - trustScore
        - kycTier

    RALDAlias:
      type: object
      description: A RALD alias record in the ALIA routing table
      properties:
        id:
          type: string
          format: uuid
          description: Alias UUID
        alias:
          type: string
          description: The alias handle, e.g. boyd@rald
          example: boyd@rald
        aliasType:
          type: string
          enum: [username, rald_email, phone, email, business, school]
          description: The type of alias
          example: username
        userId:
          type: string
          description: The RALD UUID of the owning user
          example: rld_8dj39sj29k
        status:
          type: string
          enum: [active, suspended, pending, archived]
          example: active
        resolvedTo:
          $ref: "#/components/schemas/AliasResolution"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - alias
        - aliasType
        - userId
        - status
        - resolvedTo
        - createdAt
        - updatedAt

    AliasResolveResponse:
      type: object
      properties:
        alias:
          type: string
          example: boyd@rald
        aliasType:
          type: string
          example: username
        resolvedTo:
          $ref: "#/components/schemas/AliasResolution"
      required:
        - alias
        - aliasType
        - resolvedTo

    AliasListResponse:
      type: object
      properties:
        aliases:
          type: array
          items:
            $ref: "#/components/schemas/RALDAlias"
      required:
        - aliases

    CreateAliasRequest:
      type: object
      properties:
        alias:
          type: string
          pattern: "^[a-z0-9_.]+@rald$"
          description: The alias handle — must end in @rald
          example: boydtech@rald
        aliasType:
          type: string
          enum: [username, rald_email, phone, email, business, school]
          description: The type of alias to create
          example: business
      required:
        - alias
        - aliasType

    UpdateAliasStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [active, suspended, archived]
          description: New status for the alias
          example: archived
      required:
        - status

    RALDWallet:
      type: object
      description: PayRald wallet record. Balance is stored in minor units (e.g. NGN kobo).
      properties:
        id:
          type: string
          description: Wallet ID — format `wallet_rld_xxxxxxxxxx`
          example: wallet_rld_8dj39sj29k
        userId:
          type: string
          description: Owning RALD user ID
          example: rld_8dj39sj29k
        balance:
          type: integer
          description: Current balance in minor units (e.g. 10000 = 100.00 NGN)
          example: 10000
        currency:
          type: string
          description: ISO 4217 currency code
          example: KES
        status:
          type: string
          enum: [active, frozen, closed]
          example: active
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - balance
        - currency
        - status
        - createdAt
        - updatedAt

    RALDTransaction:
      type: object
      description: A single ledger entry on a PayRald wallet.
      properties:
        id:
          type: string
          format: uuid
        walletId:
          type: string
          description: Wallet this transaction belongs to
        type:
          type: string
          enum: [credit, debit, transfer_in, transfer_out]
          example: credit
        amount:
          type: integer
          description: Transaction amount in minor units
          example: 5000
        currency:
          type: string
          example: NGN
        reference:
          type: string
          description: Unique idempotency key for this transaction
          example: ref_a1b2c3d4e5f6g7h8
        description:
          type: string
          nullable: true
          example: Top-up from M-Pesa
        fromWalletId:
          type: string
          nullable: true
          description: Source wallet ID for transfers
        toWalletId:
          type: string
          nullable: true
          description: Destination wallet ID for transfers
        status:
          type: string
          enum: [completed, failed, pending]
          example: completed
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - walletId
        - type
        - amount
        - currency
        - reference
        - status
        - createdAt

    TransactionListResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/RALDTransaction"
      required:
        - transactions

    CreditRequest:
      type: object
      properties:
        amount:
          type: integer
          minimum: 1
          description: Amount in minor units
          example: 10000
        currency:
          type: string
          default: NGN
          example: NGN
        reference:
          type: string
          maxLength: 128
          description: Optional idempotency key — generated if omitted
          example: bank_tx_abc123
        description:
          type: string
          maxLength: 255
          example: Top-up from Bank Transfer
      required:
        - amount

    DebitRequest:
      type: object
      properties:
        amount:
          type: integer
          minimum: 1
          description: Amount in minor units
          example: 2000
        currency:
          type: string
          default: NGN
          example: NGN
        reference:
          type: string
          maxLength: 128
          example: checkout_order_9876
        description:
          type: string
          maxLength: 255
          example: Payment to merchant
      required:
        - amount

    WalletMutationResponse:
      type: object
      properties:
        balance:
          type: integer
          description: New wallet balance after the operation
          example: 15000
        transaction:
          $ref: "#/components/schemas/RALDTransaction"
      required:
        - balance
        - transaction

    TransferRequest:
      type: object
      properties:
        to:
          type: string
          description: Recipient ALIA handle (`boyd@rald`) or bare username (`boyd`)
          example: boyd@rald
        amount:
          type: integer
          minimum: 1
          description: Amount in minor units
          example: 5000
        currency:
          type: string
          default: NGN
          example: NGN
        description:
          type: string
          maxLength: 255
          example: Lunch split
      required:
        - to
        - amount

    TransferResponse:
      type: object
      properties:
        senderBalance:
          type: integer
          description: Sender's new balance after transfer
          example: 5000
        transaction:
          $ref: "#/components/schemas/RALDTransaction"
        to:
          type: string
          description: Resolved recipient ALIA handle
          example: boyd@rald
      required:
        - senderBalance
        - transaction
        - to

    AdminUserItem:
      type: object
      description: A RALD identity record as seen by an admin. Never includes password hash.
      properties:
        id:
          type: string
          example: rld_8dj39sj29k
        username:
          type: string
          example: boyd
        email:
          type: string
          format: email
          example: boyd@example.com
        raldEmail:
          type: string
          nullable: true
          example: boyd@rald.cloud
        aliasHandle:
          type: string
          nullable: true
          example: boyd@rald
        walletId:
          type: string
          nullable: true
          example: wallet_rld_8dj39sj29k
        role:
          type: string
          enum: [user, admin]
          example: user
        trustScore:
          type: integer
          minimum: 0
          maximum: 100
          example: 0
        kycTier:
          type: integer
          minimum: 1
          maximum: 3
          example: 1
        activatedProducts:
          type: array
          items:
            type: string
          example: [payrald]
        suspended:
          type: string
          nullable: true
          description: Suspension reason, or null if active
          example: null
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - email
        - role
        - trustScore
        - kycTier
        - activatedProducts
        - createdAt
        - updatedAt

    AdminUserListResponse:
      type: object
      description: Paginated list of RALD users returned by the admin user list endpoint.
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserItem"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
      required:
        - users
        - pagination

    PaginationMeta:
      type: object
      description: Pagination metadata included in list responses.
      properties:
        total:
          type: integer
          description: Total number of matching records across all pages
          example: 142
        limit:
          type: integer
          description: Page size used for this request
          example: 50
        offset:
          type: integer
          description: Starting position of this page
          example: 0
        hasMore:
          type: boolean
          description: Whether more records exist beyond this page
          example: true
      required:
        - total
        - limit
        - offset
        - hasMore

    AdminWalletListResponse:
      type: object
      description: Paginated list of wallets returned by the admin list endpoint.
      properties:
        wallets:
          type: array
          items:
            $ref: "#/components/schemas/RALDWallet"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
      required:
        - wallets
        - pagination

    AdminWalletResponse:
      type: object
      description: Admin wallet inspection — wallet record plus recent transaction history.
      properties:
        wallet:
          $ref: "#/components/schemas/RALDWallet"
        recentTransactions:
          type: array
          description: Up to 20 most recent transactions, newest first.
          items:
            $ref: "#/components/schemas/RALDTransaction"
      required:
        - wallet
        - recentTransactions

    AdminWalletActionResponse:
      type: object
      description: Result of a freeze or unfreeze admin action.
      properties:
        message:
          type: string
          example: Wallet frozen
        wallet:
          $ref: "#/components/schemas/RALDWallet"
      required:
        - message
        - wallet

    InsufficientFundsError:
      type: object
      properties:
        error:
          type: string
          example: Insufficient funds
        balance:
          type: integer
          description: Current wallet balance
          example: 3000
        required:
          type: integer
          description: Amount that was requested
          example: 5000
      required:
        - error

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
